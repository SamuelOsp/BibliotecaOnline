<app-navbar></app-navbar>
<div class="container mt-4">
  <h2>{{ editMode ? 'Editar' : 'Agregar' }} libro</h2>
  <form (ngSubmit)="save()">
    <div class="mb-3">
      <label class="form-label">Título</label>
      <input class="form-control" [(ngModel)]="model.titulo" name="titulo" required />
    </div>
    <div class="mb-3">
      <label class="form-label">Autor</label>
      <input class="form-control" [(ngModel)]="model.autor" name="autor" required />
    </div>
    <div class="mb-3">
      <label class="form-label">Editorial</label>
      <input class="form-control" [(ngModel)]="model.editorial" name="editorial"/>
    </div>
    <div class="mb-3">
      <label class="form-label">Disponibilidad</label>
      <select class="form-select" [(ngModel)]="model.disponibilidad" name="disponibilidad">
        <option value="disponible">disponible</option>
        <option value="prestado">prestado</option>
        <option value="reservado">reservado</option>
      </select>
    </div>
    <button class="btn btn-success" type="submit">Guardar</button>
    <a class="btn btn-secondary ms-2" routerLink="/">Volver</a>
  </form>
</div>
