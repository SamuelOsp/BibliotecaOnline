<div class="container">
  <h2>Iniciar Sesión</h2>
  <form (ngSubmit)="login()">
    <div class="mb-3">
      <label>Nombre de usuario</label>
      <input [(ngModel)]="nombre" name="nombre" class="form-control" required />
    </div>
    <div class="mb-3">
      <label>Contraseña</label>
      <input type="password" [(ngModel)]="contrasena" name="contrasena" class="form-control" required />
    </div>
    <div *ngIf="error" class="text-danger">{{ error }}</div>
    <button class="btn btn-primary" type="submit">Ingresar</button>
  </form>

  <div class="mt-3 text-center">
    <p>¿No tienes cuenta?</p>
    <button class="btn btn-link" (click)="irARegistro()">Registrarse</button>
  </div>



</div>
